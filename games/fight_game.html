<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>街机格斗 - Arcade Fighter</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #0a0a1a 0%, #1a1a2e 50%, #0f0f23 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Orbitron', sans-serif;
            overflow: hidden;
        }

        .game-title {
            font-family: 'Press Start 2P', cursive;
            font-size: 28px;
            color: #FFD700;
            text-shadow:
                0 0 10px #FFD700,
                0 0 20px #FF6600,
                0 0 30px #FF4400,
                4px 4px 0 #000;
            margin-bottom: 15px;
            letter-spacing: 4px;
            animation: titleGlow 2s ease-in-out infinite;
        }

        @keyframes titleGlow {
            0%, 100% { text-shadow: 0 0 10px #FFD700, 0 0 20px #FF6600, 0 0 30px #FF4400, 4px 4px 0 #000; }
            50% { text-shadow: 0 0 20px #FFD700, 0 0 40px #FF6600, 0 0 60px #FF4400, 4px 4px 0 #000; }
        }

        .game-container {
            position: relative;
            border: 4px solid #FFD700;
            box-shadow:
                0 0 20px rgba(255, 215, 0, 0.5),
                inset 0 0 50px rgba(0, 0, 0, 0.8);
            border-radius: 4px;
        }

        #gameCanvas {
            display: block;
            background: #0a0a0a;
        }

        .ui-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .player-info {
            display: flex;
            flex-direction: column;
            gap: 5px;
            width: 350px;
        }

        .player-info.p2 {
            align-items: flex-end;
        }

        .player-name {
            font-family: 'Press Start 2P', cursive;
            font-size: 12px;
            color: #fff;
            text-shadow: 2px 2px 0 #000;
        }

        .player-name.p1 { color: #FF6666; }
        .player-name.p2 { color: #66AAFF; }

        .bar-container {
            width: 100%;
            height: 25px;
            background: #1a1a1a;
            border: 2px solid #333;
            border-radius: 3px;
            position: relative;
            overflow: hidden;
        }

        .health-bar {
            height: 100%;
            background: linear-gradient(180deg, #44ff44 0%, #22aa22 50%, #119911 100%);
            transition: width 0.3s ease;
            position: relative;
        }

        .health-bar::after {
            content: '';
            position: absolute;
            top: 2px;
            left: 5px;
            right: 5px;
            height: 6px;
            background: linear-gradient(180deg, rgba(255,255,255,0.4) 0%, transparent 100%);
            border-radius: 2px;
        }

        .health-bar.low {
            background: linear-gradient(180deg, #ff4444 0%, #cc2222 50%, #991111 100%);
        }

        .health-bar.mid {
            background: linear-gradient(180deg, #ffaa00 0%, #cc8800 50%, #996600 100%);
        }

        .energy-bar {
            height: 12px;
            background: #1a1a2e;
            border: 1px solid #333;
            border-radius: 2px;
            margin-top: 3px;
            overflow: hidden;
        }

        .energy-fill {
            height: 100%;
            background: linear-gradient(180deg, #4488ff 0%, #2266cc 100%);
            box-shadow: 0 0 10px #4488ff;
            transition: width 0.2s ease;
        }

        .timer-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
        }

        .timer {
            font-family: 'Press Start 2P', cursive;
            font-size: 36px;
            color: #FFD700;
            text-shadow: 3px 3px 0 #000;
        }

        .round-info {
            font-size: 10px;
            color: #888;
            text-transform: uppercase;
        }

        .wins-display {
            display: flex;
            gap: 10px;
            margin-top: 5px;
        }

        .win-dot {
            width: 12px;
            height: 12px;
            border: 2px solid #666;
            border-radius: 2px;
        }

        .win-dot.active.p1 {
            background: #FF4444;
            border-color: #FF4444;
            box-shadow: 0 0 8px #FF4444;
        }

        .win-dot.active.p2 {
            background: #4488FF;
            border-color: #4488FF;
            box-shadow: 0 0 8px #4488FF;
        }

        .controls-info {
            margin-top: 15px;
            display: flex;
            gap: 60px;
            color: #666;
            font-size: 11px;
        }

        .control-set {
            text-align: center;
        }

        .control-set h4 {
            color: #888;
            margin-bottom: 5px;
            font-size: 12px;
        }

        .control-set.p1 h4 { color: #FF6666; }
        .control-set.p2 h4 { color: #66AAFF; }

        .key {
            display: inline-block;
            background: #2a2a3a;
            border: 1px solid #444;
            border-radius: 3px;
            padding: 2px 6px;
            margin: 1px;
            font-family: monospace;
            color: #aaa;
            font-size: 10px;
        }

        .game-message {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-family: 'Press Start 2P', cursive;
            font-size: 48px;
            color: #FFD700;
            text-shadow:
                0 0 20px #FFD700,
                0 0 40px #FF6600,
                4px 4px 0 #000;
            animation: messagePulse 0.5s ease-in-out infinite;
            pointer-events: none;
            z-index: 100;
        }

        .game-message.ko {
            color: #ff4444;
            font-size: 64px;
            text-shadow:
                0 0 20px #ff0000,
                0 0 40px #ff0000,
                0 0 60px #ff0000,
                4px 4px 0 #000;
        }

        .game-message.p1-win {
            color: #FF4444;
            text-shadow:
                0 0 20px #FF4444,
                0 0 40px #FF6666,
                4px 4px 0 #000;
        }

        .game-message.p2-win {
            color: #4488FF;
            text-shadow:
                0 0 20px #4488FF,
                0 0 40px #66AAFF,
                4px 4px 0 #000;
        }

        @keyframes messagePulse {
            0%, 100% { transform: translate(-50%, -50%) scale(1); }
            50% { transform: translate(-50%, -50%) scale(1.1); }
        }

        .combo-display {
            position: absolute;
            font-family: 'Press Start 2P', cursive;
            font-size: 20px;
            color: #FFD700;
            text-shadow: 2px 2px 0 #000;
            pointer-events: none;
            animation: comboPopup 0.3s ease-out;
        }

        @keyframes comboPopup {
            0% { transform: scale(0.5); opacity: 0; }
            50% { transform: scale(1.3); }
            100% { transform: scale(1); opacity: 1; }
        }

        .start-screen {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.9);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 200;
        }

        .start-screen h2 {
            font-family: 'Press Start 2P', cursive;
            font-size: 24px;
            color: #FFD700;
            margin-bottom: 30px;
            text-shadow: 0 0 10px #FFD700;
        }

        .start-btn {
            font-family: 'Press Start 2P', cursive;
            font-size: 16px;
            padding: 15px 40px;
            background: linear-gradient(180deg, #FF6600 0%, #CC4400 100%);
            border: none;
            border-radius: 5px;
            color: #fff;
            cursor: pointer;
            text-shadow: 2px 2px 0 #000;
            box-shadow: 0 4px 0 #883300, 0 0 20px rgba(255, 102, 0, 0.5);
            transition: all 0.1s ease;
        }

        .start-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 0 #883300, 0 0 30px rgba(255, 102, 0, 0.7);
        }

        .start-btn:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0 #883300, 0 0 10px rgba(255, 102, 0, 0.5);
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>
    <h1 class="game-title">ARCADE FIGHTER</h1>

    <div class="game-container">
        <canvas id="gameCanvas" width="1200" height="600"></canvas>

        <div class="ui-overlay">
            <div class="player-info p1">
                <div class="player-name p1">火焰战士</div>
                <div class="bar-container">
                    <div class="health-bar" id="p1Health" style="width: 100%"></div>
                </div>
                <div class="energy-bar">
                    <div class="energy-fill" id="p1Energy" style="width: 0%"></div>
                </div>
                <div class="wins-display">
                    <div class="win-dot p1" id="p1Win1"></div>
                    <div class="win-dot p1" id="p1Win2"></div>
                </div>
            </div>

            <div class="timer-container">
                <div class="timer" id="timer">99</div>
                <div class="round-info">ROUND <span id="roundNum">1</span>/3</div>
            </div>

            <div class="player-info p2">
                <div class="player-name p2">寒冰忍者</div>
                <div class="bar-container">
                    <div class="health-bar" id="p2Health" style="width: 100%"></div>
                </div>
                <div class="energy-bar">
                    <div class="energy-fill" id="p2Energy" style="width: 0%"></div>
                </div>
                <div class="wins-display">
                    <div class="win-dot p2" id="p2Win1"></div>
                    <div class="win-dot p2" id="p2Win2"></div>
                </div>
            </div>
        </div>

        <div class="game-message hidden" id="gameMessage"></div>

        <div class="start-screen" id="startScreen">
            <h2>READY TO FIGHT!</h2>
            <button class="start-btn" id="startBtn">START GAME</button>
        </div>
    </div>

    <div class="controls-info">
        <div class="control-set p1">
            <h4>PLAYER 1</h4>
            <div><span class="key">A</span><span class="key">D</span> 移动 | <span class="key">W</span> 跳跃</div>
            <div><span class="key">F</span> 轻拳 | <span class="key">G</span> 重拳</div>
            <div><span class="key">H</span> 必杀技</div>
        </div>
        <div class="control-set p2">
            <h4>PLAYER 2</h4>
            <div><span class="key">←</span><span class="key">→</span> 移动 | <span class="key">↑</span> 跳跃</div>
            <div><span class="key">J</span> 轻拳 | <span class="key">K</span> 重拳</div>
            <div><span class="key">L</span> 必杀技</div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const W = canvas.width;
        const H = canvas.height;

        // Game state
        let gameState = 'start'; // start, fighting, roundEnd, gameEnd
        let round = 1;
        let timer = 99;
        let timerInterval = null;
        let p1Wins = 0;
        let p2Wins = 0;

        // Input state
        const keys = {};

        // Particle system
        let particles = [];

        // Projectiles
        let projectiles = [];

        // Fighter class
        class Fighter {
            constructor(x, isPlayer1) {
                this.x = x;
                this.y = H - 150;
                this.vx = 0;
                this.vy = 0;
                this.width = 60;
                this.height = 120;
                this.isPlayer1 = isPlayer1;
                this.health = 100;
                this.energy = 0;
                this.maxEnergy = 100;
                this.facing = isPlayer1 ? 1 : -1;
                this.state = 'idle'; // idle, walk, jump, attack, block, hit, dead
                this.attackType = null;
                this.attackFrame = 0;
                this.attackCooldown = 0;
                this.isGrounded = true;
                this.combo = 0;
                this.comboTimer = 0;
                this.hitStun = 0;
                this.blockStun = 0;
                this.color = isPlayer1 ? '#FF4444' : '#4488FF';
                this.accentColor = isPlayer1 ? '#FFAA00' : '#00FFFF';
            }

            reset(x) {
                this.x = x;
                this.y = H - 150;
                this.vx = 0;
                this.vy = 0;
                this.health = 100;
                this.energy = 0;
                this.state = 'idle';
                this.attackType = null;
                this.attackFrame = 0;
                this.attackCooldown = 0;
                this.isGrounded = true;
                this.combo = 0;
                this.comboTimer = 0;
                this.hitStun = 0;
                this.blockStun = 0;
            }

            update(opponent) {
                // Update combo timer
                if (this.comboTimer > 0) {
                    this.comboTimer--;
                    if (this.comboTimer === 0) {
                        this.combo = 0;
                    }
                }

                // Energy regeneration (about 2 per second at 60fps)
                if (this.energy < this.maxEnergy) {
                    this.energy += 0.035;
                }

                // Cooldowns
                if (this.attackCooldown > 0) this.attackCooldown--;
                if (this.hitStun > 0) this.hitStun--;
                if (this.blockStun > 0) this.blockStun--;

                // State machine
                if (this.hitStun > 0) {
                    this.state = 'hit';
                } else if (this.attackFrame > 0) {
                    this.state = 'attack';
                    this.attackFrame--;
                    if (this.attackFrame === 0) {
                        this.state = 'idle';
                        this.attackType = null;
                    }
                } else if (this.blockStun > 0) {
                    this.state = 'block';
                } else {
                    this.state = 'idle';
                }

                // Physics
                this.x += this.vx;
                this.y += this.vy;

                // Gravity
                if (!this.isGrounded) {
                    this.vy += 0.8;
                }

                // Ground collision
                if (this.y >= H - 150 - this.height / 2) {
                    this.y = H - 150 - this.height / 2;
                    this.vy = 0;
                    this.isGrounded = true;
                }

                // Wall collision
                if (this.x < 50) this.x = 50;
                if (this.x > W - 50) this.x = W - 50;

                // Face opponent
                this.facing = opponent ? (opponent.x > this.x ? 1 : -1) : this.facing;
            }

            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.scale(this.facing, 1);

                // Shadow
                ctx.fillStyle = 'rgba(0,0,0,0.3)';
                ctx.beginPath();
                ctx.ellipse(0, this.height / 2 + 5, 30, 8, 0, 0, Math.PI * 2);
                ctx.fill();

                // Body
                const bodyOffset = this.state === 'walk' ? Math.sin(Date.now() / 100) * 5 : 0;
                const jumpOffset = !this.isGrounded ? -10 : 0;

                // Legs
                ctx.fillStyle = this.color;
                const legSpread = this.state === 'walk' ? Math.sin(Date.now() / 80) * 15 : 0;
                ctx.fillRect(-12 + legSpread, 20 + jumpOffset, 10, 35);
                ctx.fillRect(2 - legSpread, 20 + jumpOffset, 10, 35);

                // Body/Torso
                ctx.fillStyle = this.color;
                ctx.fillRect(-18 + bodyOffset, -20 + jumpOffset, 36, 45);

                // Arms
                ctx.fillStyle = this.accentColor;
                const armAngle = this.state === 'attack' ? Math.PI / 4 * (1 - this.attackFrame / 20) : 0;
                ctx.save();
                ctx.translate(-20 + bodyOffset, -10 + jumpOffset);
                ctx.rotate(-0.3 + armAngle);
                ctx.fillRect(-5, 0, 10, 30);
                ctx.restore();

                ctx.save();
                ctx.translate(20 + bodyOffset, -10 + jumpOffset);
                ctx.rotate(0.3 - armAngle);
                ctx.fillRect(-5, 0, 10, 30);
                ctx.restore();

                // Head
                ctx.fillStyle = '#FFE0BD';
                ctx.fillRect(-15 + bodyOffset, -55 + jumpOffset, 30, 35);

                // Hair/Headband
                ctx.fillStyle = this.color;
                ctx.fillRect(-17 + bodyOffset, -58 + jumpOffset, 34, 10);

                // Headband tail
                if (this.isPlayer1) {
                    ctx.fillRect(15 + bodyOffset, -53 + jumpOffset, 20, 6);
                }

                // Eyes
                ctx.fillStyle = '#000';
                ctx.fillRect(-8 + bodyOffset, -45 + jumpOffset, 6, 6);
                ctx.fillRect(2 + bodyOffset, -45 + jumpOffset, 6, 6);

                // Attack effect
                if (this.state === 'attack' && this.attackFrame > 10) {
                    ctx.fillStyle = this.accentColor;
                    ctx.globalAlpha = (this.attackFrame - 10) / 10;
                    const attackRange = this.attackType === 'heavy' ? 60 : 40;
                    ctx.beginPath();
                    ctx.arc(30 + bodyOffset, 0 + jumpOffset, attackRange / 2, -0.5, 0.5);
                    ctx.fill();
                    ctx.globalAlpha = 1;
                }

                // Block effect
                if (this.state === 'block') {
                    ctx.strokeStyle = '#00FFFF';
                    ctx.lineWidth = 3;
                    ctx.globalAlpha = 0.5 + Math.sin(Date.now() / 50) * 0.3;
                    ctx.beginPath();
                    ctx.arc(0, 0, 50, 0, Math.PI * 2);
                    ctx.stroke();
                    ctx.globalAlpha = 1;
                }

                // Hit effect
                if (this.state === 'hit') {
                    ctx.fillStyle = '#FFFFFF';
                    ctx.globalAlpha = 0.7;
                    ctx.fillRect(-20, -60, 40, 100);
                    ctx.globalAlpha = 1;
                }

                ctx.restore();
            }

            attack(type) {
                if (this.attackCooldown > 0 || this.hitStun > 0 || this.blockStun > 0) return;

                this.attackType = type;
                this.attackFrame = 20;
                this.attackCooldown = type === 'light' ? 15 : 25;
                this.state = 'attack';

                // Create hit effect particles
                const hitX = this.x + this.facing * 50;
                for (let i = 0; i < 10; i++) {
                    particles.push({
                        x: hitX,
                        y: this.y,
                        vx: (Math.random() - 0.5) * 10,
                        vy: (Math.random() - 0.5) * 10,
                        life: 20,
                        color: this.accentColor,
                        size: Math.random() * 5 + 2
                    });
                }
            }

            special() {
                if (this.energy < 30 || this.attackCooldown > 0 || this.hitStun > 0) return;

                this.energy -= 30;
                this.attackType = 'special';
                this.attackFrame = 30;
                this.attackCooldown = 40;
                this.state = 'attack';

                // Create projectile
                projectiles.push({
                    x: this.x + this.facing * 40,
                    y: this.y - 10,
                    vx: this.facing * 12,
                    owner: this.isPlayer1 ? 'p1' : 'p2',
                    damage: 25,
                    life: 60,
                    color: this.isPlayer1 ? '#FF6600' : '#00CCFF'
                });
            }

            jump() {
                if (!this.isGrounded || this.hitStun > 0) return;
                this.vy = -15;
                this.isGrounded = false;
            }

            move(dir) {
                if (this.hitStun > 0 || this.blockStun > 0 || this.attackFrame > 10) return;
                this.vx = dir * 5;
                if (this.isGrounded && this.state !== 'attack') {
                    this.state = 'walk';
                }
            }

            stopMove() {
                this.vx = 0;
                if (this.isGrounded && this.state === 'walk') {
                    this.state = 'idle';
                }
            }

            block(active) {
                if (this.hitStun > 0) return;
                if (active && this.blockStun === 0) {
                    this.blockStun = 10;
                }
            }

            takeDamage(damage, attacker) {
                let actualDamage = damage;
                if (this.state === 'block') {
                    actualDamage = Math.floor(damage * 0.3);
                    this.blockStun = 15;
                    // Block particles
                    for (let i = 0; i < 5; i++) {
                        particles.push({
                            x: this.x,
                            y: this.y,
                            vx: (Math.random() - 0.5) * 8,
                            vy: (Math.random() - 0.5) * 8,
                            life: 15,
                            color: '#FFFFFF',
                            size: Math.random() * 3 + 1
                        });
                    }
                } else {
                    this.hitStun = 20;
                    this.vx = attacker.facing * 8;

                    // Hit particles
                    for (let i = 0; i < 15; i++) {
                        particles.push({
                            x: this.x,
                            y: this.y,
                            vx: (Math.random() - 0.5) * 15,
                            vy: (Math.random() - 0.5) * 15,
                            life: 25,
                            color: '#FF0000',
                            size: Math.random() * 6 + 2
                        });
                    }

                    // Update combo
                    attacker.combo++;
                    attacker.comboTimer = 60;
                    attacker.energy = Math.min(attacker.maxEnergy, attacker.energy + 10);
                }

                this.health = Math.max(0, this.health - actualDamage);
                return actualDamage;
            }

            getAttackHitbox() {
                if (this.state !== 'attack' || this.attackFrame < 15 || this.attackFrame > 18) return null;

                const damage = this.attackType === 'light' ? 8 : (this.attackType === 'heavy' ? 15 : (this.attackType === 'special' ? 25 : 0));
                const range = this.attackType === 'light' ? 40 : (this.attackType === 'heavy' ? 60 : (this.attackType === 'special' ? 30 : 0));

                return {
                    x: this.x + this.facing * range,
                    y: this.y,
                    width: range,
                    height: 40,
                    damage: damage
                };
            }
        }

        // Create fighters
        let p1 = new Fighter(250, true);
        let p2 = new Fighter(W - 250, false);

        // Draw background
        function drawBackground() {
            // Sky gradient
            const gradient = ctx.createLinearGradient(0, 0, 0, H);
            gradient.addColorStop(0, '#0a0a1a');
            gradient.addColorStop(0.5, '#1a1a2e');
            gradient.addColorStop(1, '#0f0f1a');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, W, H);

            // Moon
            ctx.fillStyle = '#FFFFEE';
            ctx.shadowColor = '#FFFFEE';
            ctx.shadowBlur = 30;
            ctx.beginPath();
            ctx.arc(W - 150, 80, 40, 0, Math.PI * 2);
            ctx.fill();
            ctx.shadowBlur = 0;

            // Buildings
            ctx.fillStyle = '#0a0a12';
            const buildings = [
                { x: 50, w: 120, h: 300 },
                { x: 200, w: 100, h: 250 },
                { x: 350, w: 150, h: 350 },
                { x: 550, w: 80, h: 200 },
                { x: 700, w: 130, h: 280 },
                { x: 880, w: 100, h: 220 },
                { x: 1020, w: 140, h: 320 }
            ];

            buildings.forEach(b => {
                ctx.fillRect(b.x, H - b.h - 150, b.w, b.h);

                // Windows
                ctx.fillStyle = Math.random() > 0.7 ? '#FFAA00' : '#1a1a2a';
                for (let wy = H - b.h - 140; wy < H - 160; wy += 25) {
                    for (let wx = b.x + 10; wx < b.x + b.w - 10; wx += 20) {
                        if (Math.random() > 0.4) {
                            ctx.fillStyle = Math.random() > 0.5 ? '#FFAA00' : '#00AAFF';
                            ctx.globalAlpha = 0.3 + Math.random() * 0.4;
                        } else {
                            ctx.fillStyle = '#111122';
                            ctx.globalAlpha = 1;
                        }
                        ctx.fillRect(wx, wy, 12, 18);
                    }
                }
                ctx.globalAlpha = 1;
                ctx.fillStyle = '#0a0a12';
            });

            // Neon signs
            ctx.font = 'bold 24px Orbitron';
            ctx.textAlign = 'center';

            // P1 side neon
            ctx.fillStyle = '#FF4444';
            ctx.shadowColor = '#FF4444';
            ctx.shadowBlur = 20;
            ctx.fillText('炎', 100, H - 280);
            ctx.fillText('热', 100, H - 250);

            // P2 side neon
            ctx.fillStyle = '#4488FF';
            ctx.shadowColor = '#4488FF';
            ctx.fillText('冰', W - 100, H - 280);
            ctx.fillText('雪', W - 100, H - 250);
            ctx.shadowBlur = 0;

            // Ground
            ctx.fillStyle = '#1a1a1a';
            ctx.fillRect(0, H - 150, W, 150);

            // Ground line
            ctx.strokeStyle = '#FFD700';
            ctx.lineWidth = 3;
            ctx.shadowColor = '#FFD700';
            ctx.shadowBlur = 10;
            ctx.beginPath();
            ctx.moveTo(0, H - 150);
            ctx.lineTo(W, H - 150);
            ctx.stroke();
            ctx.shadowBlur = 0;

            // Street lights
            ctx.fillStyle = '#FFFFAA';
            ctx.shadowColor = '#FFFFAA';
            ctx.shadowBlur = 15;
            for (let i = 0; i < 4; i++) {
                ctx.beginPath();
                ctx.arc(200 + i * 300, H - 180, 5, 0, Math.PI * 2);
                ctx.fill();
            }
            ctx.shadowBlur = 0;
        }

        // Draw particles
        function drawParticles() {
            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                p.x += p.vx;
                p.y += p.vy;
                p.life--;

                ctx.fillStyle = p.color;
                ctx.globalAlpha = Math.max(0, p.life / 30);
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.globalAlpha = 1;

                if (p.life <= 0) {
                    particles.splice(i, 1);
                }
            }
        }

        // Draw projectiles
        function drawProjectiles() {
            for (let i = projectiles.length - 1; i >= 0; i--) {
                const proj = projectiles[i];
                proj.x += proj.vx;
                proj.life--;

                // Glow
                ctx.fillStyle = proj.color;
                ctx.shadowColor = proj.color;
                ctx.shadowBlur = 20;
                ctx.beginPath();
                ctx.arc(proj.x, proj.y, 20, 0, Math.PI * 2);
                ctx.fill();

                // Core
                ctx.fillStyle = '#FFFFFF';
                ctx.shadowBlur = 0;
                ctx.beginPath();
                ctx.arc(proj.x, proj.y, 8, 0, Math.PI * 2);
                ctx.fill();

                if (proj.life <= 0 || proj.x < 0 || proj.x > W) {
                    projectiles.splice(i, 1);
                }
            }
        }

        // Check collision
        function checkCollision(box1, box2) {
            return box1.x - box1.width/2 < box2.x + box2.width/2 &&
                   box1.x + box1.width/2 > box2.x - box2.width/2 &&
                   box1.y - box1.height/2 < box2.y + box2.height/2 &&
                   box1.y + box1.height/2 > box2.y - box2.height/2;
        }

        // Update game
        function update() {
            if (gameState !== 'fighting') return;

            // P1 input
            let p1Blocking = false;
            if (keys['KeyA']) {
                if (keys['KeyA'] && keys['KeyD']) {
                    p1Blocking = true;
                } else {
                    p1.move(-1);
                }
            } else if (keys['KeyD']) {
                p1.move(1);
            } else {
                p1.stopMove();
            }
            if (keys['KeyW']) p1.jump();
            if (keys['KeyF']) { p1.attack('light'); keys['KeyF'] = false; }
            if (keys['KeyG']) { p1.attack('heavy'); keys['KeyG'] = false; }
            if (keys['KeyH']) { p1.special(); keys['KeyH'] = false; }
            p1.block(p1Blocking);

            // P2 input
            let p2Blocking = false;
            if (keys['ArrowLeft']) {
                if (keys['ArrowLeft'] && keys['ArrowRight']) {
                    p2Blocking = true;
                } else {
                    p2.move(-1);
                }
            } else if (keys['ArrowRight']) {
                p2.move(1);
            } else {
                p2.stopMove();
            }
            if (keys['ArrowUp']) p2.jump();
            if (keys['KeyJ']) { p2.attack('light'); keys['KeyJ'] = false; }
            if (keys['KeyK']) { p2.attack('heavy'); keys['KeyK'] = false; }
            if (keys['KeyL']) { p2.special(); keys['KeyL'] = false; }
            p2.block(p2Blocking);

            // Update fighters
            p1.update(p2);
            p2.update(p1);

            // Check attack collisions
            const p1Attack = p1.getAttackHitbox();
            if (p1Attack && p2.hitStun === 0) {
                const p2Box = { x: p2.x, y: p2.y, width: 40, height: 100 };
                if (checkCollision(p1Attack, p2Box)) {
                    p2.takeDamage(p1Attack.damage, p1);
                }
            }

            const p2Attack = p2.getAttackHitbox();
            if (p2Attack && p1.hitStun === 0) {
                const p1Box = { x: p1.x, y: p1.y, width: 40, height: 100 };
                if (checkCollision(p2Attack, p1Box)) {
                    p1.takeDamage(p2Attack.damage, p2);
                }
            }

            // Check projectile collisions
            projectiles.forEach(proj => {
                const target = proj.owner === 'p1' ? p2 : p1;
                const targetBox = { x: target.x, y: target.y, width: 40, height: 100 };
                const projBox = { x: proj.x, y: proj.y, width: 20, height: 20 };

                if (checkCollision(projBox, targetBox) && target.hitStun === 0) {
                    target.takeDamage(proj.damage, proj.owner === 'p1' ? p1 : p2);
                    proj.life = 0;
                }
            });

            // Update UI
            updateUI();

            // Check win condition
            if (p1.health <= 0 || p2.health <= 0 || timer <= 0) {
                endRound();
            }
        }

        // Update UI
        function updateUI() {
            // Health bars
            const p1HealthBar = document.getElementById('p1Health');
            const p2HealthBar = document.getElementById('p2Health');
            p1HealthBar.style.width = p1.health + '%';
            p2HealthBar.style.width = p2.health + '%';

            // Health color
            p1HealthBar.className = 'health-bar' + (p1.health < 30 ? ' low' : (p1.health < 60 ? ' mid' : ''));
            p2HealthBar.className = 'health-bar' + (p2.health < 30 ? ' low' : (p2.health < 60 ? ' mid' : ''));

            // Energy bars
            document.getElementById('p1Energy').style.width = p1.energy + '%';
            document.getElementById('p2Energy').style.width = p2.energy + '%';

            // Timer
            document.getElementById('timer').textContent = timer;

            // Combo display
            if (p1.combo > 1) {
                showCombo(p2.x, p2.y - 80, p1.combo);
            }
            if (p2.combo > 1) {
                showCombo(p1.x, p1.y - 80, p2.combo);
            }
        }

        // Show combo text
        function showCombo(x, y, count) {
            ctx.save();
            ctx.font = 'bold 24px "Press Start 2P"';
            ctx.fillStyle = '#FFD700';
            ctx.textAlign = 'center';
            ctx.shadowColor = '#FF6600';
            ctx.shadowBlur = 10;
            ctx.fillText(count + ' COMBO!', x, y);
            ctx.restore();
        }

        // End round
        function endRound() {
            gameState = 'roundEnd';
            clearInterval(timerInterval);

            let winner;
            if (p1.health > p2.health) {
                winner = 'p1';
                p1Wins++;
            } else if (p2.health > p1.health) {
                winner = 'p2';
                p2Wins++;
            } else {
                winner = 'draw';
            }

            // Check if game over (best of 3, first to 2 wins)
            if (p1Wins >= 2 || p2Wins >= 2) {
                gameState = 'gameEnd';
                showGameMessage(winner === 'p1' ? 'PLAYER 1 WINS!' : (winner === 'p2' ? 'PLAYER 2 WINS!' : 'DRAW!'), winner + '-win');
                setTimeout(() => {
                    document.getElementById('startScreen').classList.remove('hidden');
                    document.getElementById('startBtn').textContent = 'PLAY AGAIN';
                }, 3000);
            } else {
                round++;
                showGameMessage(winner === 'p1' ? 'P1 WINS!' : (winner === 'p2' ? 'P2 WINS!' : 'TIME UP!'), winner);
                setTimeout(() => {
                    startRound();
                }, 2000);
            }

            // Update win dots
            if (p1Wins >= 1) document.getElementById('p1Win1').classList.add('active');
            if (p1Wins >= 2) document.getElementById('p1Win2').classList.add('active');
            if (p2Wins >= 1) document.getElementById('p2Win1').classList.add('active');
            if (p2Wins >= 2) document.getElementById('p2Win2').classList.add('active');
        }

        // Show game message
        function showGameMessage(text, className) {
            const msg = document.getElementById('gameMessage');
            msg.textContent = text;
            msg.className = 'game-message ' + className;
            msg.classList.remove('hidden');
        }

        // Hide game message
        function hideGameMessage() {
            document.getElementById('gameMessage').classList.add('hidden');
        }

        // Start round
        function startRound() {
            p1.reset(250);
            p2.reset(W - 250);
            p1.energy = 0;
            p2.energy = 0;
            timer = 99;
            projectiles = [];
            particles = [];
            gameState = 'fighting';
            hideGameMessage();

            document.getElementById('roundNum').textContent = round;

            timerInterval = setInterval(() => {
                if (gameState === 'fighting') {
                    timer--;
                    if (timer <= 0) {
                        endRound();
                    }
                }
            }, 1000);
        }

        // Start game
        function startGame() {
            document.getElementById('startScreen').classList.add('hidden');
            round = 1;
            p1Wins = 0;
            p2Wins = 0;

            // Reset win dots
            document.getElementById('p1Win1').classList.remove('active');
            document.getElementById('p1Win2').classList.remove('active');
            document.getElementById('p2Win1').classList.remove('active');
            document.getElementById('p2Win2').classList.remove('active');

            startRound();
        }

        // Game loop
        function gameLoop() {
            // Clear
            ctx.clearRect(0, 0, W, H);

            // Draw
            drawBackground();
            drawProjectiles();
            drawParticles();
            p1.draw();
            p2.draw();

            // Update
            update();

            requestAnimationFrame(gameLoop);
        }

        // Event listeners
        document.addEventListener('keydown', (e) => {
            keys[e.code] = true;

            // Prevent scrolling
            if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight', 'Space'].includes(e.code)) {
                e.preventDefault();
            }
        });

        document.addEventListener('keyup', (e) => {
            keys[e.code] = false;
        });

        document.getElementById('startBtn').addEventListener('click', startGame);

        // Start game loop
        gameLoop();
    </script>
</body>
